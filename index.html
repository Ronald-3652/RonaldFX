</style></head><body><header>
<h2>Limsoft Forex</h2>
<nav>
<a href="#">Home</a>

</nav>
</header><div class="hero">
<div>
<h1>RonaldFXacademy vip Signals</h1>
<p>Trade Smart. Earn Consistently.</p>
<button class="btn" onclick="alert('Join Telegram')">Join Now</button>
</div>
<img src="IMG_20260120_153613.jpg">
</div><section id="signals">
<h2>Premium Signals</h2>
<div class="card">🔒 Locked Signal - Purchase to Access</div>
</section><section id="payment">
<h2>Buy Signals</h2>
<div class="card">
<input type="text" id="name" placeholder="Full Name">
<input type="text" id="phone" placeholder="Phone Number"><button class="btn" onclick="payMpesa()">M-Pesa Payment</button> <button class="btn" onclick="payCard()">Card Payment</button>

</div>
</section><section>
<h2>Customers</h2>
<div id="customers"></div>
</section><footer>
© 2026 RonaldFX Forex Academy
</footer><script>
function saveCustomer(name, phone, method){
 let customers = JSON.parse(localStorage.getItem("customers")) || [];
 customers.push({name, phone, method});
 localStorage.setItem("customers", JSON.stringify(customers));
 showCustomers();
}

function showCustomers(){
 let customers = JSON.parse(localStorage.getItem("customers")) || [];
 let output = "";
 customers.forEach(c => {
   output += `<div class='card'>${c.name} | ${c.phone} | ${c.method}</div>`;
 });
 document.getElementById("customers").innerHTML = output;
}

function payMpesa(){
 let name=document.getElementById("name").value;
 let phone=document.getElementById("phone").value;
 if(!name||!phone) return alert("Fill details");
 alert("STK Push Sent to "+phone);
 saveCustomer(name,phone,"M-Pesa");
}

function payCard(){
 let name=document.getElementById("name").value;
 let phone=document.getElementById("phone").value;
 if(!name||!phone) return alert("Fill details");
 alert("Processing Card Payment");
 saveCustomer(name,phone,"Card");
}

showCustomers();
</script></body>
